services:
  db:
    image: postgres:17
    container_name: hw20-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hw20-mlflow
    depends_on:
      db:
        condition: service_healthy
    environment:
      BACKEND_STORE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT}
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - --artifacts-destination
      - ${MLFLOW_ARTIFACT_ROOT}
      - --serve-artifacts
    ports:
      - "${MLFLOW_PORT}:5000"
    volumes:
      - mlflow_artifacts:${MLFLOW_ARTIFACT_ROOT}
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_artifacts:
