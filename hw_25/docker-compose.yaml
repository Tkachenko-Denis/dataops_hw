services:
  prometheus:
    image: prom/prometheus:latest
    container_name: hw25-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: hw25-grafana
    depends_on:
      - prometheus
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./configs/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./configs/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: hw25-node-exporter
    command:
      - --path.rootfs=/
    ports:
      - "9100:9100"

  mlapp:
    build:
      context: ../hw_24
      dockerfile: Dockerfile
    container_name: hw25-mlapp
    ports:
      - "8012:8000"
